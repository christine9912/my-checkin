<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動領取核對系統</title>
  <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .stats-container { display: flex; justify-content: space-around; background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stat-box { text-align: center; }
        .stat-box span { display: block; font-size: 24px; font-weight: bold; color: #007bff; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #list-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f8f9fa; }
        .hidden { display: none; }
        .status-msg { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

    <h2>領取進度統計</h2>
    <div class="stats-container">
        <div class="stat-box">Day F<span id="count-F">0</span></div>
        <div class="stat-box">Day S<span id="count-S">0</span></div>
        <div class="stat-box">Day T<span id="count-T">0</span></div>
    </div>

    <div class="input-group">
        <label>領取編號 (如: F001)</label>
        <input type="text" id="input-code" placeholder="請輸入編號" autocomplete="off">
    </div>
    <div class="input-group">
        <label>電郵首字母 (小寫)</label>
        <input type="text" id="input-prefix" placeholder="請輸入電郵開頭第一個字母" maxlength="1" autocomplete="off">
    </div>
    <button onclick="handleCheckIn()">核對並領取</button>
    <div id="status-msg" class="status-msg"></div>

    <div id="list-section">
        <button style="background: #6c757d;" onclick="toggleList()">顯示/隱藏待領取名單</button>
        <div id="remaining-list" class="hidden">
            <table>
                <thead>
                    <tr><th>編號</th><th>姓名</th><th>電郵首字</th></tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script>
// 1. 初始化 Supabase
const SUPABASE_URL = 'https://nhyimioswqoxnbyqvkmd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QZ7GaYy_yLBd6N40SdeyiA_ItCYqXf2Y'; // 確保這是你的 anon public key
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


        // 2. 實時統計功能
        async function updateStats() {
            const { data, error } = await _supabase
                .from('check_in')
                .select('code')
                .eq('is_collected', false);
            
            if (data) {
                const counts = { F: 0, S: 0, T: 0 };
                data.forEach(item => {
                    const type = item.code.charAt(0).toUpperCase();
                    if (counts.hasOwnProperty(type)) counts[type]++;
                });
                document.getElementById('count-F').innerText = counts.F;
                document.getElementById('count-S').innerText = counts.S;
                document.getElementById('count-T').innerText = counts.T;
            }
        }

        // 3. 雙重驗證核對邏輯
        async function handleCheckIn() {
            const code = document.getElementById('input-code').value.trim().toUpperCase();
            const prefix = document.getElementById('input-prefix').value.trim().toLowerCase();
            const msgDiv = document.getElementById('status-msg');

            if (!code || !prefix) {
                showMsg("請輸入完整編號與首字母", "#dc3545");
                return;
            }

            // 搜尋匹配項目
            const { data, error } = await _supabase
                .from('check_in')
                .select('*')
                .eq('code', code)
                .eq('email_prefix', prefix)
                .eq('is_collected', false)
                .single();

            if (data) {
                const { error: updateError } = await _supabase
                    .from('check_in')
                    .update({ is_collected: true, updated_at: new Date() })
                    .eq('code', code);

                if (!updateError) {
                    showMsg(`核對成功！${data.name} 已完成領取。`, "#28a745");
                    document.getElementById('input-code').value = '';
                    document.getElementById('input-prefix').value = '';
                    updateStats(); // 更新數字
                    if (!document.getElementById('remaining-list').classList.contains('hidden')) fetchList(); // 若名單開啟則更新
                }
            } else {
                showMsg("編號或首字母錯誤，或該員已領取過。", "#dc3545");
            }
        }

        // 4. 隱藏式名單功能
        async function fetchList() {
            const { data } = await _supabase
                .from('check_in')
                .select('code, name, email_prefix')
                .eq('is_collected', false)
                .order('code', { ascending: true });

            const tbody = document.getElementById('list-body');
            tbody.innerHTML = data.map(i => `<tr><td>${i.code}</td><td>${i.name}</td><td>${i.email_prefix}</td></tr>`).join('');
        }

        function toggleList() {
            const listDiv = document.getElementById('remaining-list');
            listDiv.classList.toggle('hidden');
            if (!listDiv.classList.contains('hidden')) fetchList();
        }

        function showMsg(text, color) {
            const msgDiv = document.getElementById('status-msg');
            msgDiv.innerText = text;
            msgDiv.style.backgroundColor = color;
            msgDiv.style.color = "white";
            msgDiv.style.display = "block";
        }

        // 頁面加載時執行
        updateStats();
    </script>
</body>
</html>
