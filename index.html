<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動領取核對系統 - 穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; line-height: 1.6; }
        .stats-container { display: flex; justify-content: space-around; background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .stat-box { text-align: center; }
        .stat-box span { display: block; font-size: 24px; font-weight: bold; color: #007bff; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background: #218838; }
        #status-msg { margin-top: 10px; padding: 10px; border-radius: 4px; display: none; text-align: center; color: white; }
        #list-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h2>領取進度統計</h2>
    <div class="stats-container">
        <div class="stat-box">Day F<span id="count-F">0</span></div>
        <div class="stat-box">Day S<span id="count-S">0</span></div>
        <div class="stat-box">Day T<span id="count-T">0</span></div>
    </div>

    <div class="input-group">
        <label>領取編號 (如: F001)</label>
        <input type="text" id="input-code" placeholder="請輸入編號" autocomplete="off">
    </div>
    <div class="input-group">
        <label>電郵首字母 (小寫)</label>
        <input type="text" id="input-prefix" placeholder="請輸入電郵開頭第一個字母" maxlength="1" autocomplete="off">
    </div>
    <button onclick="handleCheckIn()">核對並領取</button>
    <div id="status-msg"></div>

    <div id="list-section">
        <button style="background: #6c757d;" onclick="toggleList()">顯示/隱藏待領取名單</button>
        <div id="remaining-list" class="hidden">
            <table>
                <thead>
                    <tr><th>編號</th><th>姓名</th><th>首字</th></tr>
                </thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const API_URL = 'https://nhyimioswqoxnbyqvkmd.supabase.co';
        // 請務必將下方的 KEY 換成你 Supabase 後台那串以 eyJ 開頭的長金鑰
        const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oeWltaW9zd3FveG5ieXF2a21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTEzNjYsImV4cCI6MjA5MTgyNzM2Nn0.hv_fcbAhQqhJ4J07pYGRevsbrK64MUz2i9NlgFqrYvo'; 

        const headers = {
            'apikey': API_KEY,
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        // 1. 實時統計功能 (使用原生 fetch)
        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}?is_collected=eq.false&select=code`, { headers });
                const data = await response.json();
                
                const counts = { F: 0, S: 0, T: 0 };
                data.forEach(item => {
                    const type = item.code.charAt(0).toUpperCase();
                    if (counts.hasOwnProperty(type)) counts[type]++;
                });
                document.getElementById('count-F').innerText = counts.F;
                document.getElementById('count-S').innerText = counts.S;
                document.getElementById('count-T').innerText = counts.T;
            } catch (e) { console.error("統計載入失敗", e); }
        }

        // 2. 雙重驗證核對邏輯
        async function handleCheckIn() {
            const code = document.getElementById('input-code').value.trim().toUpperCase();
            const prefix = document.getElementById('input-prefix').value.trim().toLowerCase();

            if (!code || !prefix) { showMsg("請輸入完整資料", "#dc3545"); return; }

            try {
                // 先查詢是否有此人
                const queryRes = await fetch(`${API_URL}?code=eq.${code}&email_prefix=eq.${prefix}&is_collected=eq.false&select=*`, { headers });
                const userData = await queryRes.json();

                if (userData && userData.length > 0) {
                    // 執行更新
                    const updateRes = await fetch(`${API_URL}?code=eq.${code}`, {
                        method: 'PATCH',
                        headers: headers,
                        body: JSON.stringify({ is_collected: true, updated_at: new Date() })
                    });

                    if (updateRes.ok) {
                        showMsg(`核對成功！${userData[0].name} 已領取。`, "#28a745");
                        updateStats();
                        if (!document.getElementById('remaining-list').classList.contains('hidden')) fetchList();
                    }
                } else {
                    showMsg("資料不符或已領取過。", "#dc3545");
                }
            } catch (e) { showMsg("連線出錯，請檢查網路", "#dc3545"); }
        }

        // 3. 隱藏名單功能
        async function fetchList() {
            try {
                const res = await fetch(`${API_URL}?is_collected=eq.false&select=code,name,email_prefix&order=code.asc`, { headers });
                const data = await res.json();
                const tbody = document.getElementById('list-body');
                tbody.innerHTML = data.map(i => `<tr><td>${i.code}</td><td>${i.name}</td><td>${i.email_prefix}</td></tr>`).join('');
            } catch (e) {}
        }

        function toggleList() {
            const listDiv = document.getElementById('remaining-list');
            listDiv.classList.toggle('hidden');
            if (!listDiv.classList.contains('hidden')) fetchList();
        }

        function showMsg(text, color) {
            const msgDiv = document.getElementById('status-msg');
            msgDiv.innerText = text;
            msgDiv.style.backgroundColor = color;
            msgDiv.style.display = "block";
        }

        // 啟動
        updateStats();
    </script>
</body>
</html>
